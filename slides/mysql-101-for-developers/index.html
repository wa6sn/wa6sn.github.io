<li><strong>更新クエリ</strong>
<ul>
<li>コミット時、ディスク上のテーブルに直接書き込む</li>

<ul>
<li>
<p>ディスクへの I/O 量と回数を削減したいから</p>
<ul>
<li>回転メディアを前提とした当時の設計においては、特に重要だった</li>

</li>
<li>
<p>都度テーブルへ同期的に更新してしまうと、毎回ランダム書き込みになり高コスト</p>
<ul>
<li>代わりに Redo ログへ、ページの変更操作を <strong>追記</strong>
<ul>
<li>低コストなシーケンシャル書き込みに変換している、とも</li>
</ul>
</li>
<li>「同じレコードへの操作なら最終状態だけ反映したろ！」といった細かいテクも</li>
</ul>
</li>
</ul>

<h1 id="%E9%81%8B%E7%94%A8%E3%82%92%E8%80%83%E3%81%88%E3%81%9F%E3%81%A8%E3%81%8D%E3%81%AB">運用を考えたときに</h1>
<ul>
<li>
<p>データ構造やクエリに手を加えていなくても、将来的に「データ量が増える → バッファプールからあふれ、ストレージへのアクセスが増える → パフォーマンスが落ちる」といったことがありえる</p>
</li>
<li>
<p>一般的にデータ量・レコード量が多いほど、あらゆる操作のコストが高くなり、<br />
運用の難易度は上がる（それはそう）</p>
<ul>
<li>より正確には、バッファプールは LRU ベースのため「生きたデータの量が」ではある</li>
</ul>
</li>
</ul>
</section>

<h1 id="%E3%81%93%E3%81%AE%E7%AF%80%E3%81%AE%E3%81%BE%E3%81%A8%E3%82%81">この節のまとめ</h1>
<ul>
<li>
<p><strong>ディスク I/O は常に高コスト</strong> という前提がある</p>
<ul>
<li>DB に限らず、あらゆるシステムで I/O 削減の工夫がされている</li>
<li>InnoDB アーキテクチャを見ても、様々な箇所に「バッファ」が登場する</li>
</ul>
</li>
<li>
<p><strong>参照・更新いずれの場合も</strong> データはメモリ（バッファプール）を通る</p>
<ul>
<li><code>innodb_buffer_pool_size</code> は非常に重要なパラメータである
<ul>
<li>デフォルトは <code>{DBInstanceClassMemory*3/4}</code></li>
</ul>
</li>
</ul>
</li>
<li>
<p><strong>バッファプールは共有リソース</strong></p>
<ul>
<li>非効率なクエリは全体のパフォーマンスに影響しうる
<ul>
<li>他で使いたいキャッシュを追い出しちゃう可能性があるから</li>
</ul>
</li>
</ul>
</li>
</ul>
</section>

<ul>
<li>
<p>クラスタインデックス</p>
<ul>
<li>&quot;テーブルそのもの&quot; と言ってしまっていい</li>

<ul>

<li>クラスタインデックス以外を指す</li>
<li>指定したカラムの値の順番に並んでいる</li>
<li>指定したカラム以外のカラムを参照するときのために、プライマリキーの値を持つ</li>
</ul>
</li>
</ul>

<h1 id="%E3%82%A4%E3%83%B3%E3%83%87%E3%83%83%E3%82%AF%E3%82%B9%E3%81%8C%E3%83%AD%E3%83%83%E3%82%AF%E3%81%AE%E7%AF%84%E5%9B%B2%E3%82%82%E6%B1%BA%E3%82%81%E3%82%8B">インデックスがロックの範囲も決める</h1>
<ul>
<li>
<p>例 9 のようなケースではテーブルの全ての行にロックを取ってしまう</p>
<ul>
<li>「条件に合った行をロック」ではなく、「インデックスに対してロック」
<ul>
<li>もっと言うとネクストキーロックだが今回のスコープ外とする</li>
</ul>
</li>
<li>そのため「<code>LIMIT 1</code> しておけばよくね？」は、よくない</li>
</ul>
</li>
<li>
<p>（イメージで説明すると） <code>age &lt; 30</code> を条件に更新したいトランザクション A と、<code>age &gt; 40</code> を条件に更新したいトランザクション B があったとしよう。<br />
<code>age</code> のインデックスが</p>
<ul>
<li><strong>ある :</strong> age でソートされているから A, B の操作は干渉しないことが分かる。<br />
　A → B の順に実行しても、B → A の順に実行しても問題ないので、並列に処理できる</li>
<li><strong>ない :</strong> お互いの条件に合うレコードがどこにあるか分からないので、<br />
　全部のレコードを探す必要がある。A, B は並列に実行できない</li>
</ul>
</li>
</ul>
</section>

<h1 id="%E5%8E%9F%E5%89%87-1-%E3%83%86%E3%83%BC%E3%83%96%E3%83%AB%E3%81%AB-1-%E3%82%A4%E3%83%B3%E3%83%87%E3%83%83%E3%82%AF%E3%82%B9%E3%82%92%E4%BD%BF%E3%81%A3%E3%81%A6%E6%8E%A2%E7%B4%A2%E3%81%99%E3%82%8B">原則 1 テーブルに 1 インデックスを使って探索する</h1>
<p><code>member</code> テーブルには <code>idx_age</code> と <code>idx_name</code> のみが存在する。<br />
<code>WHERE age &lt; ? AND name = ?</code> のような複合条件はどう処理されるか？</p>
<ul>
<li><strong>MySQL は 1 テーブルに 1 インデックスを使って探索する</strong> ので、<br />
<code>idx_name</code> か <code>idx_age</code> のどちらか一方のインデックスが利用されるのが原則
<ul>
<li><code>idx_age</code> と <code>idx_name</code> を候補とし、「絞り込み <strong>やすそう</strong> な方」を<br />
MySQL が判断（後述）してどちらかを利用する</li>
<li>&quot;インデックスマージ&quot; という、複数のインデックスを利用して探索したあと、<br />
それらの集合演算を行うしくみが存在するものの、初手では考慮に入れなくていい
<ul>
<li>適用できるパターンの把握も難しいので、素直に複合インデックスを作るべき</li>
<li>「全カラムに単一カラムのインデックスを貼って、インデックスマージを<br />
狙えばよくね？」とはならない</li>
</ul>
</li>
</ul>
</li>
</ul>

<h1 id="%E8%A4%87%E5%90%88%E3%82%A4%E3%83%B3%E3%83%87%E3%83%83%E3%82%AF%E3%82%B9%E3%81%AE%E3%82%AB%E3%83%A9%E3%83%A0%E9%A0%86%E5%BA%8F">複合インデックスのカラム順序</h1>
<ul>
<li>
<p><code>(name, age)</code> と <code>(age, name)</code> は別物ですか</p>
<ul>
<li>はい</li>
<li>前者ならまず name の順に並び替えて、name が同値のものを age で並び替えています
<ul>
<li><code>WHERE age &lt; ?</code> だけで絞り込みたいときに <code>(name, age)</code> は利用できません</li>
</ul>
</li>
</ul>
</li>
<li>
<p><code>(name, age)</code> と <code>(age, name)</code> のどちらを作るべきですか</p>
<ul>
<li>その DB に流れるクエリによりけりです</li>
<li>両方とも欲しい場合もありえます
<ul>
<li>雑に両方作って使ってない方を消す、という手もなくはないです</li>
</ul>
</li>
<li>どちらも使える場合、最初のカラムでより絞り込める方を使うはずです</li>
<li>例えば <code>(name, age)</code> があるなら <code>(name)</code> は要らないことがほとんどです</li>
</ul>
</li>
</ul>

<h1 id="%E5%8D%81%E5%88%86%E3%81%AA%E3%82%A4%E3%83%B3%E3%83%87%E3%83%83%E3%82%AF%E3%82%B9%E3%81%8C%E5%AD%98%E5%9C%A8%E3%81%99%E3%82%8B%E3%81%8B">十分なインデックスが存在するか？</h1>
<ul>
<li>「作るべきか」を最終的に判断するのは人間なので、都度やっていく
<ul>
<li>スロークエリログや APM から時間のかかるクエリを特定する
<ul>
<li><a href="https://dev.mysql.com/doc/refman/8.0/ja/slow-query-log.html">スロークエリログ</a> には <code>log_queries_not_using_indexes</code> のような便利そうな<br />
変数もあるけど、フォーカスしたいのは <strong>「クエリが遅いか」</strong> なので、好みで</li>
<li><code>long_query_time</code> は 0.5 など 1 以下も設定できる</li>
</ul>
</li>
<li>都度 <code>EXPLAIN</code> で実行計画を確認する</li>
</ul>
</li>

<h1 id="%E4%B8%8D%E8%A6%81%E3%81%AA%E3%82%A4%E3%83%B3%E3%83%87%E3%83%83%E3%82%AF%E3%82%B9%E3%81%8C%E3%81%AA%E3%81%84%E3%81%8B">不要なインデックスがないか？</h1>
<ul>
<li><code>performance_schema</code> という <strong>サーバが起動してから</strong> の稼働統計の入った便利な<br />
テーブル群があり、さらにそれらを人間が読みやすくした <code>sys</code> スキーマがある
<ul>
<li><a href="https://dev.mysql.com/doc/refman/8.0/ja/sys-schema-views.html">https://dev.mysql.com/doc/refman/8.0/ja/sys-schema-views.html</a></li>
<li><code>schema_unused_indexes</code> は使っていないインデックスを教えてくれる</li>
<li><code>schema_redundant_indexes</code> は冗長なインデックスを教えてくれる
<ul>
<li><code>idx_name_age</code> が既にあるときの <code>idx_name</code> みたいなヤツ</li>
</ul>
</li>
<li><code>schema_index_statistics</code> はインデックスに対する統計情報を教えてくれる
<ul>
<li>読み取り行数、更新行数、それらのレイテンシ etc</li>
</ul>
</li>
</ul>
</li>
<li><strong>MySQL 8.0 からは</strong> <a href="https://dev.mysql.com/doc/refman/8.0/ja/invisible-indexes.html">invisible index</a> を使って、いきなり削除ではなく<br />
「一旦使わないようにして様子を見る」ことが出来るようになった</li>
</ul>
</section>

<p><a href="https://dev.mysql.com/doc/refman/8.0/ja/explain.html">https://dev.mysql.com/doc/refman/8.0/ja/explain.html</a></p>
<ul>

<ul>

<h1 id="%E3%82%AB%E3%83%BC%E3%83%87%E3%82%A3%E3%83%8A%E3%83%AA%E3%83%86%E3%82%A3">カーディナリティ</h1>
<ul>
<li>「インデックス」の節で挙げた例は、いずれも「インデックスを使うことで、<br />
十分に絞り込めることが期待される」という前提がある</li>
<li>実際には、「セカンダリインデックスを使っても大して絞り込めないので、<br />
最初からクラスタインデックスでフルスキャンしたほうがよさそう」と<br />
オプティマイザが判断してしまうこともよくある</li>
<li>カラム内に異なる値がどれほどあるかを <a href="https://dev.mysql.com/doc/refman/8.0/ja/glossary.html#glos_cardinality">カーディナリティ</a> と呼ぶ。<br />
<strong>インデックスを貼るときは、カーディナリティの高い（値の種類の多い ≒ 絞り込みやすい）カラムを選ぶと効果が高い。</strong></li>
</ul>
</section>

<h1 id="%E8%A3%9C%E8%B6%B3-mysql-%E3%81%AF-join-%E3%81%8C%E9%81%85%E3%81%84%E3%81%A8%E3%81%84%E3%81%86%E8%A8%80%E8%AA%AC">補足: 「MySQL は JOIN が遅い」という言説</h1>
<p>おそらく、そう言われるもとになったのは</p>
<ul>
<li>（その頃の）オプティマイザが賢くなかった
<ul>
<li>最適化のアレコレが（他の DB に比べ）不足していた</li>
<li>JOIN アルゴリズムが NLJ しかなかった</li>
<li>いい感じのクエリの書き換えを MySQL 側でやってくれなかった</li>
</ul>
</li>
<li>統計情報が不正確だった
<ul>
<li>MySQL 5.5 で <code>innodb_stats_persistent_sample_pages</code> に相当するパラメータは、<br />
デフォルト 8 ページしかなかった</li>
</ul>
</li>
</ul>
<p>など、様々な由来がありそうです。<br />
が、<strong>通説を信じるのではなく試したほうがいいです</strong></p>
</section>

<h3 id="%E5%90%8C%E3%81%98%E6%A7%8B%E9%80%A0%E3%81%AE%E3%82%AF%E3%82%A8%E3%83%AA%E3%81%AB%E8%A6%8B%E3%81%88%E3%81%A6%E5%AE%9F%E8%A1%8C%E8%A8%88%E7%94%BB%E3%81%8C%E5%A4%89%E3%82%8F%E3%81%A3%E3%81%A6%E3%81%97%E3%81%BE%E3%81%86%E4%BE%8B">同じ構造のクエリに見えて、実行計画が変わってしまう例</h3>
<ul>
<li>LIMIT x の絞り込み件数</li>
<li>WHERE .. IN .. の対象の要素の数（参考: <a href="https://developers.freee.co.jp/entry/large-in-clouse-length-cause-full-scan">freee さんの記事</a>）</li>
</ul>
<h3 id="%E7%89%B9%E5%AE%9A%E3%81%AE%E9%96%BE%E5%80%A4%E3%82%92%E8%B6%85%E3%81%88%E3%82%8B%E3%81%A8%E3%83%91%E3%83%95%E3%82%A9%E3%83%BC%E3%83%9E%E3%83%B3%E3%82%B9%E3%81%8C%E5%8A%A3%E5%8C%96%E3%81%99%E3%82%8B%E4%BE%8B">特定の閾値を超えるとパフォーマンスが劣化する例</h3>
<ul>
<li><code>GROUP BY</code> や <code>ORDER BY</code> のような一時テーブルを利用するクエリで件数が多い
<ul>
<li><a href="https://dev.mysql.com/doc/refman/8.0/ja/internal-temporary-tables.html">https://dev.mysql.com/doc/refman/8.0/ja/internal-temporary-tables.html</a></li>
<li>集計操作を伴うクエリに対し、一定サイズまではメモリ上の一時テーブルを用いるが、それより大きいとメモリからディスクに書き出す挙動をする</li>
<li>ディスクに書き出す処理は高コストなので「特定の ID を指定したクエリでやたら遅いんだけど」という事象が発生する</li>
</ul>
</li>
</ul>

<ul>

<li>クリティカルなシステムなどで、実行計画を安定させたいモチベーションはあって、<br />
Oracle や PostgreSQL はこの辺の運用がもっと細かくやれる</li>
</ul>
</li>
</ul>

<h1 id="%E6%80%A7%E8%83%BD%E3%81%AE%E6%82%A9%E3%81%BF%E3%81%AB%E3%81%A9%E3%81%86%E5%90%91%E3%81%8D%E5%90%88%E3%81%86%E3%81%8B">性能の悩みにどう向き合うか</h1>
<h2 id="%E3%83%91%E3%83%95%E3%82%A9%E3%83%BC%E3%83%9E%E3%83%B3%E3%82%B9%E5%95%8F%E9%A1%8C%E3%81%AF%E3%83%AF%E3%83%BC%E3%82%AF%E3%83%AD%E3%83%BC%E3%83%89%E3%81%AB%E3%82%88%E3%82%8A%E3%81%91%E3%82%8A">パフォーマンス問題はワークロードによりけり</h2>
<ul>
<li><strong>システムの数だけ課題があるので、テストとモニタリングが重要</strong></li>
<li>机上ですべての挙動を把握しようとするより、手軽に本番同様の環境で<br />
テスト出来るようにしたほうがコスパがいいことがよくある
<ul>
<li>データ量、カーディナリティ、リクエスト量 は近くあるべき</li>
<li>トラブルが発生した際に再現性も確保しやすくなる</li>
<li>Aurora であれば、クローン機能などは積極的に使いたい</li>
</ul>
</li>
<li>パフォーマンステストも、なるべく本番同様のリクエストを模する
<ul>
<li>キャッシュの影響を丸めるためにある程度の時間、負荷をかけ続ける</li>
<li>単発のクエリだけでは心もとないので、シナリオを用意するとよい</li>
</ul>
</li>
</ul>

<h1 id="%E5%89%8D%E6%8F%90%E7%9F%A5%E8%AD%98%E3%82%B9%E3%83%86%E3%83%BC%E3%82%BF%E3%82%B9%E5%A4%89%E6%95%B0">前提知識｜ステータス変数</h1>
<p><a href="https://dev.mysql.com/doc/refman/8.0/ja/server-status-variables.html">https://dev.mysql.com/doc/refman/8.0/ja/server-status-variables.html</a></p>
<ul>
<li><code>Connections</code> や <code>Uptime</code> のように、サーバの稼働状況を表すもの</li>
<li><code>show [global] status like '%{variable_name}%';</code> で確認できる
<ul>
<li>ただ、主要なものは Performance Insights（後述）や CloudWatch Metrics でも確認出来るので、これを直接実行する機会は（難しめの問題に当たらない限り）そうないかもしれない</li>
</ul>
</li>
<li>スコープの概念が存在する
<ul>
<li>グローバル: サーバ全体で持つ値</li>
<li>セッション: セッション（接続）ごとに持つ値</li>
</ul>
</li>
</ul>

<h1 id="3-%E5%AF%BE%E5%87%A6%E3%83%81%E3%83%A5%E3%83%BC%E3%83%8B%E3%83%B3%E3%82%B0%E3%81%AE%E6%89%8B%E6%AE%B5">3. 対処｜チューニングの手段</h1>
<h3 id="a-%E3%83%91%E3%83%A9%E3%83%A1%E3%83%BC%E3%82%BF%E3%83%81%E3%83%A5%E3%83%BC%E3%83%8B%E3%83%B3%E3%82%B0">a. パラメータチューニング</h3>
<ul>
<li><code>innodb_buffer_pool_size</code> など、MySQL のパラメータを変更する</li>
<li>いわゆる「全体最適」を目指して、スループットを向上させることが多い
<ul>
<li>Aurora MySQL の場合、（経験上）積極的に行う機会はあまりない</li>
</ul>
</li>
</ul>
<h3 id="b-%E3%82%AF%E3%82%A8%E3%83%AA%E3%83%81%E3%83%A5%E3%83%BC%E3%83%8B%E3%83%B3%E3%82%B0">b. クエリチューニング</h3>
<ul>
<li>クエリ単体をチューニングし、レイテンシ向上を狙う</li>
<li><strong>「個別最適」のように見えて効果が小さいように見えるが、現実には非常に重要</strong>
<ul>
<li>バッファプールや CPU は共有リソース</li>
<li>効率のよいクエリは CPU を専有しないしバッファプールも荒らさないので、<br />

</li>
<li>それなりに工数は必要で、アプリ側の複雑性も増す</li>

<h1 id="%E3%83%88%E3%83%A9%E3%83%96%E3%83%AB%E3%82%92%E5%BE%8C%E3%81%8B%E3%82%89%E8%BF%BD%E3%81%86%E3%81%AE%E3%81%AF%E9%9B%A3%E3%81%97%E3%81%84">トラブルを後から追うのは難しい</h1>
<ul>
<li>
<p>「ある時点でどのようにクエリが動作していたか」を追いかけるのは難しい。<br />
ゆえに APM のようなツールでメトリクスを収集しておくことは大事</p>
<ul>
<li>ロック競合なども、その時点の状態を保存したい</li>
<li>いつ発生するか分からない障害は手強い</li>
</ul>
</li>
<li>
<p>問題を任意のタイミングで再現出来るのであれば、<br />
メトリクスの収集もし放題と言えるので、再現検証もとても大事</p>
</li>
</ul>

<h1 id="%E6%99%AE%E6%AE%B5%E3%81%AF%E4%BD%95%E3%82%92%E3%83%A2%E3%83%8B%E3%82%BF%E3%83%AA%E3%83%B3%E3%82%B0%E3%81%99%E3%82%8C%E3%81%B0%E3%81%84%E3%81%84%E3%81%AE%E3%81%8B">普段は何をモニタリングすればいいのか</h1>
<ul>
<li>
<p>データベースは「クエリの結果を返す箱」のはずだから、<br />
<strong>許容できるレイテンシでクエリが返せているか</strong> が最優先に見たいはず</p>
<ul>
<li>接続性</li>
<li>エラーログ</li>
<li>スロークエリ、各種レイテンシ</li>
</ul>
</li>
<li>
<p>CPU, RAM, 接続数といったメトリクスに機械的にアラートを設定するよりも、<br />
ベースラインを知り、異常かどうかを把握できるようにしておきたい</p>
<ul>
<li>大事なメトリクスだが、CPU High それ自身でユーザに影響があるわけではない</li>
<li><a href="https://docs.aws.amazon.com/ja_jp/AmazonRDS/latest/UserGuide/MonitoringOverview.html">https://docs.aws.amazon.com/ja_jp/AmazonRDS/latest/UserGuide/MonitoringOverview.html</a> も参考に</li>
</ul>
</li>
</ul>
</section>

<h1 id="aurora-serverless-v2">Aurora Serverless v2</h1>
<ul>
<li>よく出来ててすごいヤツ</li>
<li>ただし、<strong>サーバがスケールする</strong> のと <strong>システムがスケールする</strong> のは別の話
<ul>
<li>投資したリソースの分だけパフォーマンスも上がってほしいが、<br />
そうでないことはよくある</li>
<li>今まで通りクエリチューニング etc が重要なのは変わらない</li>
</ul>
</li>
<li>細かいことを考えたくない・初期の運用の場合に特におすすめ
<ul>
<li>Provisioned は RI も使える（ 40〜60 % オフ）ことを加味すると、<br />
コスト削減の方面はそんなに期待できない</li>
</ul>
</li>
<li>スケールダウン時に縮小されたメモリの内容が、再度スケールアップした時に<br />
再配置されているわけではない（多分）ので、p99 latency は安定しないかも
<ul>
<li>試しましょう</li>
</ul>
</li>
</ul>
</section>

<h2 id="%E3%83%87%E3%83%BC%E3%82%BF%E3%83%99%E3%83%BC%E3%82%B9%E3%81%AE%E5%A4%B1%E6%95%97%E3%81%AF%E3%83%80%E3%83%A1%E3%83%BC%E3%82%B8%E3%81%8C%E3%81%A7%E3%81%8B%E3%81%84%E3%81%AE%E3%81%A7%E6%89%8B%E5%A0%85%E3%81%84%E6%96%B9%E3%81%AB%E5%80%92%E3%81%99">データベースの失敗はダメージがでかいので、手堅い方に倒す</h2>
<ul>
<li>DB のやらなさそうな事をムリにさせないようにする
<ul>
<li>なんとなく正規化を崩さない</li>
<li>画像を RDB に入れない</li>
<li>ログを何でも全部 RDB に入れない</li>
</ul>
</li>
<li>マイナーな機能に注意する
<ul>
<li>&quot;日本語のカラム名にしてみました&quot; は、マイナーなバグを踏みそうですよね</li>
<li>「機能として存在する」ことと「実運用に耐えている」ことは別物</li>
</ul>
</li>
</ul>
