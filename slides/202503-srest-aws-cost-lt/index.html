<h1 id="%E3%83%A2%E3%83%8B%E3%82%BF%E3%83%AA%E3%83%B3%E3%82%B0">モニタリング</h1>
<ul>
<li>組織の管理者として、RI/SP の適用状況を定期的に確認している</li>
<li>Billing and Cost Management サービスで特に見ておきたいのは、以下 2 つ
<ul>
<li><strong>Utilization report</strong>: 持っている RI/SP が使われているか
<ul>
<li>できるだけ 100% を目指したい</li>
<li>これが下がると「買ったけど使われていない理由」を調べることになる</li>
</ul>
</li>
<li><strong>Coverage report</strong>: RI/SP 対象サービスについて、どれだけカバー出来ているか
<ul>
<li>できるだけ高い割合を目指したいが、ここの割合は金額基準ではなく<br />
<strong>時間基準</strong> なので、割合そのものの深追いはしなくていいと思う
<ul>
<li>安い T 系インスタンスをいっぱい並べるだけで割合が下がってしまう</li>
</ul>
</li>
<li><strong>Reservations coverage breakdown</strong> は見るべき</li>
</ul>
</li>
</ul>
</li>
