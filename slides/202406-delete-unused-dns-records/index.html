<h1 id="%E4%BE%8B%E3%81%AE%E8%A7%A3%E8%AA%AC">例の解説</h1>
<h3 id="%E5%BB%BA%E7%89%A9%E3%82%92%E5%8F%96%E3%82%8A%E5%A3%8A%E3%81%99%E3%81%AA%E3%82%89%E6%A1%88%E5%86%85%E6%9D%BF%E3%83%AC%E3%82%B3%E3%83%BC%E3%83%89%E3%82%82%E5%A4%96%E3%81%95%E3%81%AA%E3%81%84%E3%81%A8%E3%81%84%E3%81%91%E3%81%AA%E3%81%84">「建物を取り壊すなら、案内板（レコード）も外さないといけない」</h3>
<ul>
<li>
<p>任意のサブドメインを指定して取得できる Netlify や Vercel のような<br />
サービスでは、<strong>temp-event</strong>.netlify.com. は誰でも取得できるので、<br />
DNS リソースレコードも同時に消さないと、第三者が takeover できてしまう</p>
<ul>
<li>その他、S3 バケットの Web hosting 機能が悪用された例も
<ul>
<li><a href="https://blog.flatt.tech/entry/s3_security">https://blog.flatt.tech/entry/s3_security</a></li>
</ul>
</li>
</ul>
</li>
<li>
<p>CNAME レコードの例だけでなく、AWS の Elastic IP のような<br />
「共有プールから払い出されるような IP」を A レコードで指定している場合も、<br />
第三者による takeover が起こりうる</p>
</li>
</ul>
</section>

<h1 id="%E8%A3%9C%E8%B6%B3-ns-takeover">補足: NS takeover</h1>
<ul>
<li>
<p>ネームサーバにおいても同様の仕組みでドメイン名を takeover できる</p>
<ul>
<li>「委任先」が無くなっているのを確認して、なりかわるイメージ</li>
</ul>
</li>
<li>
<p>サービス提供者側が takeover を防ぐような仕組みを用意していることがある</p>
<ul>
<li><a href="https://github.com/indianajson/can-i-take-over-dns">https://github.com/indianajson/can-i-take-over-dns</a> のような、<br />
Vulnerable な DNS Provider かどうかをリストするようなリポジトリもある</li>
<li>AWS の Route53 はネームサーバとしては <strong>Not Vulnerable（安全）</strong>
<ul>
<li><a href="https://docs.aws.amazon.com/ja_jp/Route53/latest/DeveloperGuide/protection-from-dangling-dns.html">https://docs.aws.amazon.com/ja_jp/Route53/latest/DeveloperGuide/protection-from-dangling-dns.html</a></li>

<h1 id="%E5%AF%BE%E5%BF%9C">対応</h1>
<ul>
<li>
<p>DNS takeover という攻撃の概念を社内で共有した</p>
</li>
<li>
<p>会社にある全 AWS アカウントの Route53 に設定されているリソースレコードを<br />
列挙・共有しつつ、レコードタイプ別にリスク判断と棚卸し</p>
<ul>
<li>「CNAME で向き先が Vercel や Netlifiy のように任意のサブドメインを取得できるもの」はリスク高、「向き先が CloudFront」ならドメインの左端部分はランダム化されているのでリスク低、みたいな</li>
</ul>
</li>
<li>
<p>それはそうと、使っていないものは消してほしいな、といった呼びかけ</p>
</li>
</ul>
